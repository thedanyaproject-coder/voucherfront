<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gutschein kaufen | Gasthaus Alt Grieth</title>
  <style>
    :root {
      --gold: #bdad82;
      --dark: #160520;
      --white: #ffffff;
      --light: #f8f6f1;
      --border: #d8cfb8;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Acto", Arial, sans-serif;
      background: var(--light);
      color: var(--dark);
    }

    .page {
      max-width: 920px;
      margin: 0 auto;
      padding: 32px 20px 48px;
    }

    .card {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 28px 22px;
    }

    .header {
      text-align: center;
      margin-bottom: 28px;
    }

    .eyebrow {
      letter-spacing: 3px;
      font-size: 13px;
      margin-bottom: 8px;
      color: var(--gold);
      text-transform: uppercase;
    }

    h1 {
      margin: 0 0 10px;
      font-size: 34px;
      font-weight: 600;
      letter-spacing: 2px;
      color: var(--dark);
    }

    .intro {
      margin: 0 auto;
      max-width: 620px;
      line-height: 1.6;
      font-size: 16px;
    }

    .section-title {
      font-size: 18px;
      font-weight: 600;
      margin: 24px 0 12px;
    }

    .amount-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      margin-bottom: 8px;
    }

    .amount-btn {
      border: 1px solid var(--gold);
      background: var(--white);
      color: var(--dark);
      border-radius: 8px;
      padding: 16px 10px;
      font-size: 18px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .amount-btn.active,
    .amount-btn:hover {
      background: var(--gold);
      color: var(--white);
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-top: 8px;
    }

    .field {
      display: flex;
      flex-direction: column;
    }

    .field.full {
      grid-column: 1 / -1;
    }

    label {
      margin-bottom: 7px;
      font-size: 14px;
      font-weight: 600;
      color: var(--dark);
    }

    input,
    textarea {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px 14px;
      font-size: 15px;
      font-family: "Acto", Arial, sans-serif;
      color: var(--dark);
      background: var(--white);
      outline: none;
    }

    input:focus,
    textarea:focus {
      border-color: var(--gold);
    }

    textarea {
      min-height: 120px;
      resize: vertical;
    }

    .note {
      margin-top: 18px;
      font-size: 14px;
      line-height: 1.6;
      color: var(--dark);
      opacity: 0.9;
    }

    .actions {
      text-align: center;
      margin-top: 28px;
    }

    .pay-btn {
      border: none;
      background: var(--dark);
      color: var(--white);
      padding: 16px 34px;
      border-radius: 6px;
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 1px;
      cursor: pointer;
      min-width: 240px;
    }

    .pay-btn:hover {
      opacity: 0.95;
    }

    .pay-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .status {
      margin-top: 18px;
      text-align: center;
      font-size: 15px;
      line-height: 1.5;
    }

    .error {
      color: #9b1c1c;
    }

    .success {
      color: #1f6b3b;
    }

    .footer-info {
      text-align: center;
      margin-top: 22px;
      font-size: 13px;
      line-height: 1.6;
      color: var(--dark);
      opacity: 0.8;
    }

    @media (max-width: 768px) {
      .page {
        padding: 20px 14px 30px;
      }

      .card {
        padding: 20px 16px;
        border-radius: 8px;
      }

      h1 {
        font-size: 28px;
      }

      .amount-grid {
        grid-template-columns: repeat(2, 1fr);
      }

      .form-grid {
        grid-template-columns: 1fr;
      }

      .field.full {
        grid-column: auto;
      }

      .pay-btn {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="card">
      <div class="header">
        <div class="eyebrow">Gasthaus Alt Grieth</div>
        <h1>GUTSCHEIN BESTELLEN</h1>
        <p class="intro">
          Wählen Sie Ihren Wunschbetrag und gestalten Sie Ihren Gutschein mit einer persönlichen Nachricht.
        </p>
      </div>

      <div>
        <div class="section-title">Wunschbetrag wählen</div>
        <div class="amount-grid">
          <button type="button" class="amount-btn" data-amount="25">€ 25</button>
          <button type="button" class="amount-btn active" data-amount="50">€ 50</button>
          <button type="button" class="amount-btn" data-amount="75">€ 75</button>
          <button type="button" class="amount-btn" data-amount="100">€ 100</button>
        </div>
        <input type="hidden" id="amount" value="50" />
      </div>

      <div class="form-grid">
        <div class="field">
          <label for="name">Name des Empfängers</label>
          <input id="name" type="text" placeholder="z. B. Anna Müller" />
        </div>

        <div class="field">
          <label for="email">E-Mail des Käufers</label>
          <input id="email" type="email" placeholder="ihre@email.de" />
        </div>

        <div class="field full">
          <label for="message">Persönliche Nachricht (optional)</label>
          <textarea id="message" placeholder="Ihr persönlicher Gruß ..."></textarea>
        </div>
      </div>

      <div class="note">
        Der Gutschein ist 1 Jahr ab Kaufdatum gültig. Zur Einlösung ist nur der Gutschein selbst erforderlich.
      </div>

      <div class="actions">
        <button id="payBtn" class="pay-btn" type="button" onclick="startPayment()">
          JETZT BEZAHLEN
        </button>
      </div>

      <div id="statusMessage" class="status"></div>

      <div class="footer-info">
        Sichere Online-Zahlung über Mollie
      </div>
    </div>
  </div>

  <script>
    const amountButtons = document.querySelectorAll(".amount-btn");
    const amountInput = document.getElementById("amount");
    const statusMessage = document.getElementById("statusMessage");
    const payBtn = document.getElementById("payBtn");

    amountButtons.forEach((button) => {
      button.addEventListener("click", () => {
        amountButtons.forEach((btn) => btn.classList.remove("active"));
        button.classList.add("active");
        amountInput.value = button.dataset.amount;
      });
    });

    function showStatus(message, type = "") {
      statusMessage.className = "status";
      if (type) statusMessage.classList.add(type);
      statusMessage.textContent = message;
    }

    function validateForm() {
      const amount = amountInput.value.trim();
      const name = document.getElementById("name").value.trim();
      const email = document.getElementById("email").value.trim();

      if (!amount) {
        showStatus("Bitte wählen Sie einen Betrag.", "error");
        return false;
      }

      if (!name) {
        showStatus("Bitte geben Sie den Namen des Empfängers ein.", "error");
        return false;
      }

      if (!email) {
        showStatus("Bitte geben Sie Ihre E-Mail-Adresse ein.", "error");
        return false;
      }

      return true;
    }

    async function startPayment() {
      if (!validateForm()) return;

      const amount = document.getElementById("amount").value;
      const name = document.getElementById("name").value.trim();
      const email = document.getElementById("email").value.trim();
      const message = document.getElementById("message").value.trim();

      showStatus("Ihre Zahlung wird vorbereitet ...");
      payBtn.disabled = true;

      try {
        const res = await fetch("https://voucherbackend.vercel.app/api/createPayment", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            amount,
            name,
            email,
            message
          })
        });

        const data = await res.json();

        if (!res.ok) {
          showStatus(data.error || "Beim Starten der Zahlung ist ein Fehler aufgetreten.", "error");
          payBtn.disabled = false;
          return;
        }

        localStorage.setItem("lastPaymentId", data.id || "");
        localStorage.setItem("lastVoucherCode", data.voucherCode || "");
        localStorage.setItem("lastVoucherEmail", email);
        localStorage.setItem("lastVoucherName", name);

        if (data.checkoutUrl) {
          window.location.href = data.checkoutUrl;
        } else {
          showStatus("Keine Zahlungs-URL erhalten.", "error");
          payBtn.disabled = false;
        }
      } catch (err) {
        showStatus("Serverfehler: " + err.message, "error");
        payBtn.disabled = false;
      }
    }
  </script>
</body>
</html>
