<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Gutschein kaufen</title>
  <style>
    body {
      font-family: Georgia, serif;
      background: #f4ead7;
      text-align: center;
      padding: 40px;
    }
    .box {
      background: white;
      padding: 30px;
      border-radius: 16px;
      max-width: 500px;
      margin: auto;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }
    input, button {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border-radius: 8px;
      border: 1px solid #ccc;
      font-size: 16px;
    }
    button {
      background: #6d4329;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }
  </style>
</head>
<body>

<div class="box">
  <h1>Gutschein kaufen</h1>

  <input id="amount" type="number" placeholder="Betrag (€)" />
  <input id="name" type="text" placeholder="Ihr Name" />
  <input id="email" type="email" placeholder="Ihre E-Mail" />
  <input id="message" type="text" placeholder="Nachricht (optional)" />

  <button onclick="startPayment()">Jetzt bezahlen</button>

  <p id="status"></p>
</div>

<script>
const BACKEND_URL = "https://voucherback.vercel.app/api/createPayment";

async function startPayment() {
  const amount = document.getElementById("amount").value;
  const name = document.getElementById("name").value;
  const email = document.getElementById("email").value;
  const message = document.getElementById("message").value;

  if (!amount || amount <= 0) {
    alert("Bitte gültigen Betrag eingeben");
    return;
  }

  document.getElementById("status").innerText = "Bezig met betaling...";

  try {
    const res = await fetch(BACKEND_URL, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        amount,
        name,
        email,
        message,
        description: "Gutschein Alt Grieth"
      })
    });

    const data = await res.json();

    if (data.checkoutUrl) {
      window.location.href = data.checkoutUrl;
    } else {
      throw new Error("Geen checkout URL");
    }

  } catch (err) {
    document.getElementById("status").innerText = "Fout: " + err.message;
  }
}
</script>

</body>
</html>
