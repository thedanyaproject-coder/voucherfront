<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Gutschein</title>

<style>
body {
  font-family: Georgia, serif;
  background: linear-gradient(#3d2a1f,#6f4a32);
  color: white;
  padding: 40px;
}

.box {
  max-width: 600px;
  margin: auto;
  background: #fff;
  color: #333;
  padding: 30px;
  border-radius: 10px;
}

input, select, button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  font-size: 18px;
}

button {
  background: #8b6f47;
  color: white;
  border: none;
  cursor: pointer;
}

.preview {
  margin-top: 20px;
  padding: 15px;
  background: #f5f1e8;
}
</style>
</head>

<body>

<div class="box">
<h1>Gutschein kaufen</h1>

<input id="name" placeholder="FÜR:" />

<select id="amount">
  <option value="25">25 €</option>
  <option value="50">50 €</option>
  <option value="75">75 €</option>
  <option value="100">100 €</option>
</select>

<button onclick="pay()">Bezahlen</button>

<div class="preview" id="preview"></div>
</div>

<script>
function generateCode(){
  const d = new Date();
  return d.getFullYear() +
    String(d.getMonth()+1).padStart(2,"0") +
    String(d.getDate()).padStart(2,"0") +
    "-" +
    Math.floor(1000+Math.random()*9000);
}

document.getElementById("amount").addEventListener("change", showPreview);
document.getElementById("name").addEventListener("input", showPreview);

function showPreview(){
  const code = generateCode();
  const amount = document.getElementById("amount").value;
  const name = document.getElementById("name").value;

  document.getElementById("preview").innerHTML = `
    <b>Vorschau:</b><br>
    Code: ${code}<br>
    Betrag: € ${amount}<br>
    Für: ${name}
  `;
}

async function pay(){
  const amount = document.getElementById("amount").value;
  const name = document.getElementById("name").value;

  const res = await fetch("/api/createPayment", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({amount:Number(amount),name})
  });

  const data = await res.json();
  window.location.href = data.checkoutUrl;
}

showPreview();
</script>

</body>
</html>
