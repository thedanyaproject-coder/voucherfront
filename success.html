<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Voucher</title>

<style>
body {
  margin:0;
  background:#eee;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.voucher {
  width:1123px;
  height:794px;
  background:#fffaf0;
  border:6px solid #8b6f47;
  padding:40px;
  position:relative;
  font-family:Georgia;
}

.title {
  text-align:center;
  font-size:42px;
  letter-spacing:2px;
}

.subtitle {
  text-align:center;
  font-size:36px;
  margin-bottom:30px;
}

.amount {
  text-align:center;
  font-size:70px;
}

.right {
  position:absolute;
  right:40px;
  top:200px;
}

.footer {
  position:absolute;
  bottom:40px;
  width:100%;
  text-align:center;
}
</style>
</head>

<body>

<div class="voucher">

<div class="title">Gasthaus Alt Grieth</div>
<div class="subtitle">GUTSCHEIN</div>

<div class="amount" id="amount"></div>

<div class="right">
<b>FÜR:</b>
<div id="name"></div>
</div>

<div class="footer">
<div id="code"></div>
<div id="paid"></div>
</div>

</div>

<script>
const p = new URLSearchParams(window.location.search);

const amount = p.get("amount");
const name = p.get("name");
const code = p.get("voucher");

document.getElementById("amount").innerText = "€ " + amount;
document.getElementById("name").innerText = name;
document.getElementById("code").innerText = "Referenz: " + code;

const date = new Date().toLocaleDateString("de-DE");

document.getElementById("paid").innerText =
  "Dieser Gutschein wurde am " + date + " via Mollie bezahlt.";
</script>

</body>
</html>
