<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zahlung erfolgreich</title>
  <style>
    body {
      font-family: Georgia, serif;
      background: #f4ead7;
      text-align: center;
      padding: 40px;
      margin: 0;
    }
    .box {
      background: white;
      padding: 30px;
      border-radius: 16px;
      max-width: 600px;
      margin: auto;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }
    button {
      margin-top: 20px;
      padding: 12px 20px;
      border-radius: 8px;
      border: none;
      background: #6d4329;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }
  </style>
</head>
<body>

<div class="box" id="app">
  <h1>Zahlung wird geprüft...</h1>
  <p>Bitte warten Sie einen Moment.</p>
</div>

<script>
async function checkPayment() {
  const app = document.getElementById("app");
  const paymentId = localStorage.getItem("molliePaymentId");

  if (!paymentId) {
    app.innerHTML = `
      <h1>Geen payment ID</h1>
      <p>De betaling is niet correct opgeslagen in de browser.</p>
      <p>Ga terug en start de betaling opnieuw.</p>
    `;
    return;
  }

  try {
    const res = await fetch(
      "https://voucherback.vercel.app/api/checkPayment?id=" + encodeURIComponent(paymentId)
    );

    const data = await res.json();

    if (!res.ok) {
      throw new Error(data.error || "Fehler bei der Zahlungsprüfung");
    }

    if (data.status === "paid") {
      app.innerHTML = `
        <h1>Zahlung erfolgreich ✅</h1>
        <p><strong>Betrag:</strong> € ${data.amount}</p>
        <p><strong>Name:</strong> ${data.name || "-"}</p>
        <p><strong>Nachricht:</strong> ${data.message || "-"}</p>
        <button onclick="downloadVoucher()">Gutschein herunterladen</button>
      `;
    } else {
      app.innerHTML = `
        <h1>Zahlung nicht abgeschlossen</h1>
        <p>Status: <strong>${data.status}</strong></p>
      `;
    }
  } catch (err) {
    app.innerHTML = `
      <h1>Fehler</h1>
      <p>${err.message}</p>
    `;
  }
}

function downloadVoucher() {
  alert("Volgende stap: PDF voucher koppelen.");
}

checkPayment();
</script>

</body>
</html>
