<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Zahlung erfolgreich</title>
  <style>
    body {
      margin: 0;
      padding: 40px 20px;
      background: #ffffff;
      color: #160520;
      font-family: Acto, sans-serif;
      text-align: center;
    }

    .wrap {
      max-width: 700px;
      margin: 0 auto;
    }

    h1 {
      letter-spacing: 2px;
      margin-bottom: 20px;
    }

    p {
      line-height: 1.6;
      margin-bottom: 14px;
    }

    .buttons {
      margin-top: 30px;
      display: none;
    }

    .btn {
      display: inline-block;
      margin: 8px;
      padding: 14px 28px;
      background: #bdad82;
      color: #ffffff;
      text-decoration: none;
      border-radius: 4px;
      font-weight: 700;
    }

    .btn-secondary {
      background: #160520;
    }

    .error {
      color: #a00000;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Vielen Dank für Ihre Bestellung!</h1>

    <p id="statusText">Wir prüfen Ihre Zahlung ...</p>

    <div class="buttons" id="buttons">
      <a id="downloadBtn" class="btn" href="#" target="_blank" rel="noopener">
        Gutschein herunterladen
      </a>
      <a class="btn btn-secondary" href="https://www.altgrieth.de/danke">
        Weiter zu Alt Grieth
      </a>
    </div>
  </div>

  <script>
    async function loadPaymentStatus() {
      const paymentId = localStorage.getItem("lastPaymentId");
      const statusText = document.getElementById("statusText");
      const buttons = document.getElementById("buttons");
      const downloadBtn = document.getElementById("downloadBtn");

      if (!paymentId) {
        statusText.className = "error";
        statusText.textContent = "Keine Zahlungsdaten gefunden.";
        return;
      }

      try {
        const res = await fetch(`https://voucherbackend.vercel.app/api/checkpayment?id=${paymentId}`);
        const data = await res.json();

        if (!res.ok) {
          statusText.className = "error";
          statusText.textContent = "Fehler beim Prüfen der Zahlung.";
          return;
        }

        if (data.status === "paid") {
          statusText.textContent =
            "Ihre Zahlung war erfolgreich. Sie können Ihren Gutschein jetzt herunterladen und anschließend zu Alt Grieth weitergehen.";

          downloadBtn.href = `https://voucherbackend.vercel.app/api/generateVoucher?id=${paymentId}`;
          buttons.style.display = "block";
          return;
        }

        if (data.status === "open") {
          statusText.textContent =
            "Ihre Zahlung ist noch nicht abgeschlossen.";
          return;
        }

        if (data.status === "pending") {
          statusText.textContent =
            "Ihre Zahlung wird noch verarbeitet.";
          return;
        }

        statusText.className = "error";
        statusText.textContent =
          "Die Zahlung wurde nicht erfolgreich abgeschlossen.";
      } catch (err) {
        statusText.className = "error";
        statusText.textContent = "Serverfehler: " + err.message;
      }
    }

    loadPaymentStatus();
  </script>
</body>
</html>
