<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gutschein</title>

<style>
body {
  margin: 0;
  padding: 20px;
  font-family: Georgia, serif;
  background: linear-gradient(135deg,#3d2a1f,#6f4a32,#2b1b13);
}

.wrap {
  max-width: 1100px;
  margin: auto;
}

.topbox {
  background: #fffaf0;
  padding: 20px;
  border-radius: 16px;
  text-align: center;
  margin-bottom: 20px;
}

.voucher {
  background: #f7ecd0;
  border-radius: 18px;
  padding: 25px;
  box-shadow: 0 15px 40px rgba(0,0,0,0.3);
  border: 2px solid #8a6344;
}

.grid {
  display: grid;
  grid-template-columns: 2fr 1fr;
  gap: 20px;
}

.left {
  display: flex;
  flex-direction: column;
  justify-content: space-between;
}

.brand {
  font-size: 34px;
  font-weight: bold;
  color: #4a2e1d;
  letter-spacing: 2px;
}

.subtitle {
  font-size: 32px;
  font-style: italic;
  margin-top: 5px;
}

.amount {
  font-size: 60px;
  color: #6d4329;
  margin: 15px 0;
}

.message {
  background: rgba(255,255,255,0.5);
  padding: 15px;
  border-radius: 10px;
  font-size: 18px;
  min-height: 80px;
}

.footer {
  font-size: 13px;
  color: #5a3928;
  margin-top: 15px;
}

.right {
  border-left: 2px dashed #6d4329;
  padding-left: 20px;
}

.box {
  background: rgba(255,255,255,0.6);
  padding: 12px;
  border-radius: 10px;
  margin-bottom: 10px;
}

.label {
  font-size: 12px;
  color: #8a674d;
}

.value {
  font-size: 18px;
  color: #4a2e1d;
}

.code {
  font-size: 22px;
  font-weight: bold;
}

.actions {
  text-align: center;
  margin-top: 20px;
}

button {
  padding: 12px 20px;
  border: none;
  border-radius: 10px;
  background: #6d4329;
  color: white;
  cursor: pointer;
  margin: 5px;
}

@media print {
  @page {
    size: A4 landscape;
  }

  body {
    background: white;
  }

  .topbox, .actions {
    display: none;
  }

  .voucher {
    box-shadow: none;
  }
}
</style>
</head>

<body>

<div class="wrap">

<div class="topbox" id="statusBox">
  <h1>Zahlung wird geprüft...</h1>
</div>

<div id="voucherArea"></div>

</div>

<script>
function formatDate(d){
  return new Date(d).toLocaleDateString("de-DE");
}

async function checkPayment(){

  const id = localStorage.getItem("molliePaymentId");

  if(!id){
    document.getElementById("statusBox").innerHTML = "Geen payment ID";
    return;
  }

  const res = await fetch("https://voucherback.vercel.app/api/checkPayment?id="+id);
  const data = await res.json();

  if(data.status !== "paid"){
    document.getElementById("statusBox").innerHTML = "Zahlung nicht abgeschlossen";
    return;
  }

  document.getElementById("statusBox").innerHTML = "Zahlung erfolgreich";

  document.getElementById("voucherArea").innerHTML = `
    <div class="voucher">
      <div class="grid">

        <div class="left">
          <div>
            <div class="brand">Gasthaus Alt Grieth</div>
            <div class="subtitle">GUTSCHEIN</div>

            <div class="amount">€ ${data.amount}</div>

            <div class="message">
              ${data.message || "Einlösbar für Speisen und Getränke"}
            </div>
          </div>

          <div class="footer">
            Gültig bis ${formatDate(data.validUntil)}
          </div>
        </div>

        <div class="right">
          <div class="box">
            <div class="label">Käufer</div>
            <div class="value">${data.name}</div>
          </div>

          <div class="box">
            <div class="label">Kaufdatum</div>
            <div class="value">${formatDate(data.purchaseDate)}</div>
          </div>

          <div class="box">
            <div class="label">Voucher Code</div>
            <div class="value code">${data.voucherCode}</div>
          </div>
        </div>

      </div>
    </div>

    <div class="actions">
      <button onclick="window.print()">Download / Print</button>
    </div>
  `;
}

checkPayment();
</script>

</body>
</html>
